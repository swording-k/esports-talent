<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#07090f">
  <title>电竞天赋检测站 2.0</title>
  <link rel="icon" href="./assets/icon.png" type="image/png">
  <link rel="stylesheet" href="./styles.css">
  <script src="./src/app.js" defer></script>
</head>
<body>
  <div id="app" class="app-shell">
    <div class="top-line"></div>

    <main id="homeScreen" class="screen screen-home is-active" aria-labelledby="homeTitle">
      <section class="hero-panel">
        <img class="brand-icon" src="./assets/icon.png" alt="" aria-hidden="true">
        <p class="eyebrow">ESPORTS TALENT INDEX</p>
        <h1 id="homeTitle">电竞天赋检测站</h1>
        <p class="hero-copy">6 项短挑战，测出反应、手速、视野、追踪、记忆与协调。</p>
        <div class="summary-strip" id="summaryStrip">
          <div>
            <strong id="completedCount">0/6</strong>
            <span>已完成</span>
          </div>
          <div>
            <strong id="talentTitle">未校准</strong>
            <span>天赋档案</span>
          </div>
          <button class="icon-button" id="openReportBtn" type="button" aria-label="查看六维报告">REPORT</button>
        </div>
      </section>

      <section class="game-grid" id="gameGrid" aria-label="能力测试列表"></section>
      <p class="build-mark">v2.0 · offline canvas</p>
    </main>

    <main id="ruleScreen" class="screen screen-rule" aria-labelledby="ruleTitle">
      <button class="back-button" id="backToHomeBtn" type="button">返回</button>
      <section class="rule-card">
        <div class="rule-code" id="ruleCode">RX</div>
        <p class="eyebrow" id="ruleMeta">REACTION</p>
        <h2 id="ruleTitle">反应速度</h2>
        <p id="ruleDesc" class="rule-desc"></p>
        <div id="ruleTips" class="rule-tips"></div>
      </section>
      <button class="primary-button" id="startTestBtn" type="button">开始测试</button>
    </main>

    <main id="gameScreen" class="screen screen-game" aria-label="测试进行中">
      <canvas id="gameCanvas"></canvas>
    </main>

    <main id="resultScreen" class="screen screen-result" aria-labelledby="resultGameName">
      <section class="result-card">
        <p class="eyebrow" id="resultMeta">RESULT</p>
        <h2 id="resultGameName">反应速度</h2>
        <div class="score-line">
          <strong id="resultScore">0</strong>
          <span id="resultUnit">ms</span>
        </div>
        <div id="resultRank" class="rank-pill">未评级</div>
        <p id="resultRankSub" class="result-note">完成测试后生成评级</p>
        <div class="result-stats">
          <div><span>历史最佳</span><strong id="resultBest">--</strong></div>
          <div><span>六维指数</span><strong id="resultIndex">0</strong></div>
        </div>
      </section>
      <div class="button-stack">
        <button class="primary-button" id="retryBtn" type="button">再测一次</button>
        <button class="secondary-button" id="reportBtn" type="button">查看报告</button>
        <button class="ghost-button" id="homeBtn" type="button">返回首页</button>
      </div>
    </main>

    <main id="reportScreen" class="screen screen-report" aria-labelledby="reportTitle">
      <button class="back-button" id="reportBackBtn" type="button">返回</button>
      <section class="report-hero">
        <p class="eyebrow">TALENT REPORT</p>
        <h2 id="reportTitle">电竞天赋报告</h2>
        <div class="report-score">
          <strong id="overallScore">0</strong>
          <span id="overallRank">等待校准</span>
        </div>
      </section>
      <canvas id="radarCanvas" class="radar-canvas" width="320" height="240" aria-label="六维能力雷达图"></canvas>
      <section id="reportList" class="report-list"></section>
    </main>

    <section id="errorScreen" class="screen screen-error" role="alert">
      <h2>哎呀，出错了</h2>
      <p>请重启作品再试一次。</p>
      <button class="primary-button" id="reloadBtn" type="button">重新进入</button>
    </section>
  </div>
</body>
</html>
