<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>电竞天赋检测站</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      font-family: 'SF Mono', 'Fira Code', 'PingFang SC', monospace;
      background: #0a0c10;
      color: #e8e8e8;
      line-height: 1.5;
    }

    #app {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      background: #0a0c10;
    }

    #app::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 140, 0, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 140, 0, 0.03) 1px, transparent 1px);
      background-size: 20px 20px;
      pointer-events: none;
      z-index: 0;
    }

    .hud-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #ff8c00, #ff4400);
      z-index: 100;
    }

    .screens {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .screen.active {
      display: flex;
      opacity: 1;
    }

    .screen-home {
      padding: 20px 16px;
      padding-top: 23px;
    }

    .home-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .home-title {
      font-size: 28px;
      font-weight: 700;
      color: #ff8c00;
      text-shadow: 0 0 20px rgba(255, 140, 0, 0.5);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .home-subtitle {
      font-size: 12px;
      color: #5a5a6a;
      letter-spacing: 1px;
    }

    .game-cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      flex: 1;
      align-content: start;
    }

    .game-card {
      position: relative;
      background: rgba(20, 22, 30, 0.9);
      border: 1px solid rgba(255, 140, 0, 0.15);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.1s ease, border-color 0.1s ease;
    }

    .game-card:active {
      transform: scale(0.98);
      border-color: rgba(255, 140, 0, 0.5);
    }

    .card-accent {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
    }

    .card-accent-1 { background: #ff8c00; }
    .card-accent-2 { background: #4ecdc4; }
    .card-accent-3 { background: #a29bfe; }
    .card-accent-4 { background: #fd79a8; }
    .card-accent-5 { background: #00b894; }
    .card-accent-6 { background: #ffeaa7; }

    .card-icon {
      font-size: 28px;
      margin-right: 12px;
    }

    .card-info h3 {
      font-size: 14px;
      font-weight: 600;
      color: #e8e8e8;
      margin-bottom: 4px;
    }

    .card-info p {
      font-size: 11px;
      color: #5a5a6a;
    }

    .home-footer {
      text-align: center;
      padding: 12px 0;
    }

    .version {
      font-size: 10px;
      color: #3a3a4a;
    }

    .screen-rule {
      padding: 40px 24px;
      justify-content: space-between;
    }

    .rule-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .rule-icon {
      font-size: 64px;
      margin-bottom: 24px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .rule-title {
      font-size: 24px;
      font-weight: 700;
      color: #ff8c00;
      margin-bottom: 16px;
    }

    .rule-desc {
      font-size: 14px;
      color: #a8a8b8;
      line-height: 1.8;
      margin-bottom: 32px;
      max-width: 320px;
    }

    .rule-tips {
      background: rgba(255, 140, 0, 0.08);
      border: 1px solid rgba(255, 140, 0, 0.2);
      border-radius: 12px;
      padding: 16px 20px;
      text-align: left;
      width: 100%;
      max-width: 320px;
    }

    .tip-item {
      font-size: 12px;
      color: #8a8a9a;
      line-height: 1.8;
    }

    .screen-game {
      background: #0a0c10;
    }

    #gameCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .screen-result {
      padding: 40px 24px;
      justify-content: space-between;
    }

    .result-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .result-game-name {
      font-size: 16px;
      color: #5a5a6a;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .result-score {
      font-size: 72px;
      font-weight: 700;
      color: #ff8c00;
      text-shadow: 0 0 40px rgba(255, 140, 0, 0.6);
      line-height: 1;
      margin-bottom: 8px;
    }

    .result-unit {
      font-size: 18px;
      color: #5a5a6a;
      margin-bottom: 24px;
    }

    .result-rank {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .result-rank-sub {
      font-size: 14px;
      color: #5a5a6a;
      margin-bottom: 32px;
    }

    .rank-genius { color: #ff8c00; }
    .rank-excellent { color: #4ecdc4; }
    .rank-good { color: #a29bfe; }
    .rank-normal { color: #e8e8e8; }

    .result-best {
      font-size: 13px;
      color: #5a5a6a;
      padding: 8px 16px;
      background: rgba(78, 205, 196, 0.1);
      border: 1px solid rgba(78, 205, 196, 0.2);
      border-radius: 20px;
    }

    .rule-buttons,
    .result-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.1s ease, opacity 0.1s ease;
      letter-spacing: 1px;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: linear-gradient(135deg, #ff8c00, #ff4400);
      color: #0a0c10;
      box-shadow: 0 4px 20px rgba(255, 140, 0, 0.4);
    }

    .btn-ghost {
      background: transparent;
      color: #8a8a9a;
      border: 1px solid rgba(138, 138, 154, 0.3);
    }

    .btn-ghost:active {
      background: rgba(138, 138, 154, 0.1);
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="hud-bar"></div>

    <div class="screens">
      <!-- Home Screen -->
      <div id="homeScreen" class="screen screen-home active">
        <div class="home-header">
          <h1 class="home-title">电竞天赋检测站</h1>
          <p class="home-subtitle">6项能力 · 科学评估 · 扫码即玩</p>
        </div>
        <div class="game-cards">
          <div class="game-card" data-game="reaction">
            <div class="card-accent card-accent-1"></div>
            <div class="card-icon">⚡</div>
            <div class="card-info">
              <h3>反应速度</h3>
              <p>测试你的极限反应</p>
            </div>
          </div>
          <div class="game-card" data-game="clickspeed">
            <div class="card-accent card-accent-2"></div>
            <div class="card-icon">👆</div>
            <div class="card-info">
              <h3>极限手速</h3>
              <p>30秒极速点击</p>
            </div>
          </div>
          <div class="game-card" data-game="vision">
            <div class="card-accent card-accent-3"></div>
            <div class="card-icon">👁</div>
            <div class="card-info">
              <h3>视野广度</h3>
              <p>瞬间记忆测试</p>
            </div>
          </div>
          <div class="game-card" data-game="tracking">
            <div class="card-accent card-accent-4"></div>
            <div class="card-icon">🎯</div>
            <div class="card-info">
              <h3>动态追踪</h3>
              <p>手眼协调挑战</p>
            </div>
          </div>
          <div class="game-card" data-game="memory">
            <div class="card-accent card-accent-5"></div>
            <div class="card-icon">🧠</div>
            <div class="card-info">
              <h3>顺序记忆</h3>
              <p>记忆序列挑战</p>
            </div>
          </div>
          <div class="game-card" data-game="coordination">
            <div class="card-accent card-accent-6"></div>
            <div class="card-icon">🏓</div>
            <div class="card-info">
              <h3>手眼协调</h3>
              <p>接球挑战</p>
            </div>
          </div>
        </div>
        <div class="home-footer">
          <span class="version">v1.0</span>
        </div>
      </div>

      <!-- Rule Screen -->
      <div id="ruleScreen" class="screen screen-rule">
        <div class="rule-content">
          <div class="rule-icon" id="ruleIcon">⚡</div>
          <h2 class="rule-title" id="ruleTitle">反应速度</h2>
          <p class="rule-desc" id="ruleDesc">规则说明</p>
          <div class="rule-tips" id="ruleTips"></div>
        </div>
        <div class="rule-buttons">
          <button class="btn btn-primary" id="startTestBtn">开始测试</button>
          <button class="btn btn-ghost" id="backToHomeBtn">返回</button>
        </div>
      </div>

      <!-- Game Screen -->
      <div id="gameScreen" class="screen screen-game">
        <canvas id="gameCanvas"></canvas>
      </div>

      <!-- Result Screen -->
      <div id="resultScreen" class="screen screen-result">
        <div class="result-content">
          <div class="result-game-name" id="resultGameName">反应速度</div>
          <div class="result-score" id="resultScore">0</div>
          <div class="result-unit" id="resultUnit">ms</div>
          <div class="result-rank" id="resultRank">普通玩家</div>
          <div class="result-rank-sub" id="resultRankSub">仍有提升空间</div>
          <div class="result-best" id="resultBest">历史最佳: --</div>
        </div>
        <div class="result-buttons">
          <button class="btn btn-primary" id="retryBtn">再测一次</button>
          <button class="btn btn-ghost" id="homeBtn">返回首页</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ========================================
    // 游戏配置
    // ========================================
    const GAMES_CONFIG = {
      reaction: {
        name: '反应速度',
        icon: '⚡',
        desc: '屏幕中央显示红色准星，等待1.5-4秒随机时间后准星变绿，听到"GO"提示后立刻点击，记录你的反应时间，共3轮取最优成绩。',
        tips: ['评分标准：', '• <180ms 天才级', '• <220ms 优秀', '• <270ms 良好', '• >350ms 需练习'],
        unit: 'ms',
        isLowerBetter: true,
        ranks: [
          { max: 180, rank: '电竞天才', sub: '天赋异禀', class: 'rank-genius' },
          { max: 220, rank: '潜力选手', sub: '反应超群', class: 'rank-excellent' },
          { max: 270, rank: '普通玩家', sub: '高于平均', class: 'rank-good' },
          { max: Infinity, rank: '普通玩家', sub: '仍有提升空间', class: 'rank-normal' }
        ]
      },
      clickspeed: {
        name: '极限手速',
        icon: '👆',
        desc: '30秒倒计时，屏幕随机出现发光橙色球，每点击一个球得1分，球消失并重新随机生成，统计30秒内成功点击总数。',
        tips: ['评分标准：', '• ≥80 天才级', '• ≥60 优秀', '• ≥40 良好', '• <25 需练习'],
        unit: '次',
        isLowerBetter: false,
        ranks: [
          { min: 80, rank: '电竞天才', sub: '手速惊人', class: 'rank-genius' },
          { min: 60, rank: '潜力选手', sub: '手速优秀', class: 'rank-excellent' },
          { min: 40, rank: '普通玩家', sub: '高于平均', class: 'rank-good' },
          { min: 0, rank: '普通玩家', sub: '仍有提升空间', class: 'rank-normal' }
        ]
      },
      vision: {
        name: '视野广度',
        icon: '👁',
        desc: '屏幕瞬间显示N个彩色圆点（3-9个），0.9秒后消失，用户选择看到了几个，共3轮，统计正确次数。',
        tips: ['评分标准：', '• 3/3 天才级', '• 2/3 优秀', '• 1/3 普通'],
        unit: '个',
        isLowerBetter: false,
        ranks: [
          { min: 3, rank: '电竞天才', sub: '火眼金睛', class: 'rank-genius' },
          { min: 2, rank: '潜力选手', sub: '观察力强', class: 'rank-excellent' },
          { min: 1, rank: '普通玩家', sub: '仍可提升', class: 'rank-good' },
          { min: 0, rank: '普通玩家', sub: '注意集中', class: 'rank-normal' }
        ]
      },
      tracking: {
        name: '动态追踪',
        icon: '🎯',
        desc: '屏幕显示一个移动的球，用户按住任意位置让球保持在圆圈内，松开或球出圈则结束，记录持续时间。球速逐渐加快。',
        tips: ['评分标准：', '• >25s 天才级', '• >15s 优秀', '• >8s 良好', '• <5s 需练习'],
        unit: '秒',
        isLowerBetter: true,
        ranks: [
          { max: 25, rank: '电竞天才', sub: '追踪大师', class: 'rank-genius' },
          { max: 15, rank: '潜力选手', sub: '反应迅速', class: 'rank-excellent' },
          { max: 8, rank: '普通玩家', sub: '高于平均', class: 'rank-good' },
          { max: Infinity, rank: '普通玩家', sub: '仍有提升空间', class: 'rank-normal' }
        ]
      },
      memory: {
        name: '顺序记忆',
        icon: '🧠',
        desc: '屏幕4个方向显示箭头（↑↓←→），箭头依次高亮，用户按相同顺序点击，序列从1个开始，每轮+1，失败则结束。',
        tips: ['评分标准：', '• ≥9 天才级', '• ≥7 优秀', '• ≥5 良好', '• ≥3 普通'],
        unit: '步',
        isLowerBetter: false,
        ranks: [
          { min: 9, rank: '电竞天才', sub: '过目不忘', class: 'rank-genius' },
          { min: 7, rank: '潜力选手', sub: '记忆超强', class: 'rank-excellent' },
          { min: 5, rank: '普通玩家', sub: '高于平均', class: 'rank-good' },
          { min: 0, rank: '普通玩家', sub: '仍有提升空间', class: 'rank-normal' }
        ]
      },
      coordination: {
        name: '手眼协调',
        icon: '🏓',
        desc: '小球从顶部落下，底部滑块可左右拖动，用户控制滑块接住小球，30秒倒计时，球速每轮加快，记录成功接住数量。',
        tips: ['评分标准：', '• ≥20 天才级', '• ≥14 优秀', '• ≥8 良好', '• ≥4 普通'],
        unit: '个',
        isLowerBetter: false,
        ranks: [
          { min: 20, rank: '电竞天才', sub: '协调大师', class: 'rank-genius' },
          { min: 14, rank: '潜力选手', sub: '手眼协调', class: 'rank-excellent' },
          { min: 8, rank: '普通玩家', sub: '高于平均', class: 'rank-good' },
          { min: 0, rank: '普通玩家', sub: '仍有提升空间', class: 'rank-normal' }
        ]
      }
    };

    // ========================================
    // 状态机
    // ========================================
    const Screen = { HOME: 'home', RULE: 'rule', GAME: 'game', RESULT: 'result' };
    let currentScreen = Screen.HOME;
    let currentGame = null;
    let currentGameId = null;

    // ========================================
    // DOM 元素
    // ========================================
    const screens = {
      home: document.getElementById('homeScreen'),
      rule: document.getElementById('ruleScreen'),
      game: document.getElementById('gameScreen'),
      result: document.getElementById('resultScreen')
    };

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // ========================================
    // 屏幕切换
    // ========================================
    function switchScreen(screenName) {
      Object.values(screens).forEach(screen => screen.classList.remove('active'));
      screens[screenName].classList.add('active');
      currentScreen = screenName;
      if (screenName === Screen.GAME) resizeCanvas();
    }

    // ========================================
    // Canvas 适配
    // ========================================
    function resizeCanvas() {
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width * window.devicePixelRatio;
      canvas.height = rect.height * window.devicePixelRatio;
      ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';
    }

    // ========================================
    // 规则页更新
    // ========================================
    function updateRuleScreen(gameId) {
      const config = GAMES_CONFIG[gameId];
      document.getElementById('ruleIcon').textContent = config.icon;
      document.getElementById('ruleTitle').textContent = config.name;
      document.getElementById('ruleDesc').textContent = config.desc;
      document.getElementById('ruleTips').innerHTML = config.tips.map(t => `<div class="tip-item">${t}</div>`).join('');
    }

    // ========================================
    // 结果页更新
    // ========================================
    function updateResultScreen(gameId, score) {
      const config = GAMES_CONFIG[gameId];
      document.getElementById('resultGameName').textContent = config.name;
      document.getElementById('resultScore').textContent = score;
      document.getElementById('resultUnit').textContent = config.unit;

      let rankConfig;
      if (config.isLowerBetter) {
        rankConfig = config.ranks.find(r => score < r.max);
      } else {
        rankConfig = config.ranks.find(r => score >= r.min);
      }

      const rankEl = document.getElementById('resultRank');
      const rankSubEl = document.getElementById('resultRankSub');
      rankEl.textContent = rankConfig.rank;
      rankEl.className = 'result-rank ' + rankConfig.class;
      rankSubEl.textContent = rankConfig.sub;

      const bestKey = `esports_best_${gameId}`;
      const bestScore = localStorage.getItem(bestKey);
      const bestEl = document.getElementById('resultBest');

      if (bestScore !== null) {
        const bestNum = parseFloat(bestScore);
        const isNewBest = config.isLowerBetter ? score < bestNum : score > bestNum;
        if (isNewBest) {
          localStorage.setItem(bestKey, score.toString());
          bestEl.textContent = `历史最佳: ${bestScore} ${config.unit} (新纪录!)`;
          bestEl.style.background = 'rgba(255, 140, 0, 0.15)';
          bestEl.style.borderColor = 'rgba(255, 140, 0, 0.4)';
        } else {
          bestEl.textContent = `历史最佳: ${bestScore} ${config.unit}`;
          bestEl.style.background = 'rgba(78, 205, 196, 0.1)';
          bestEl.style.borderColor = 'rgba(78, 205, 196, 0.2)';
        }
      } else {
        localStorage.setItem(bestKey, score.toString());
        bestEl.textContent = `历史最佳: ${score} ${config.unit}`;
        bestEl.style.background = 'rgba(255, 140, 0, 0.15)';
        bestEl.style.borderColor = 'rgba(255, 140, 0, 0.4)';
      }
    }

    // ========================================
    // 游戏基类
    // ========================================
    class BaseGame {
      constructor(ctx, canvas, width, height, options) {
        this.ctx = ctx;
        this.canvas = canvas;
        this.width = width;
        this.height = height;
        this.onEnd = options.onEnd;
        this.animationId = null;
      }

      resize(w, h) {
        this.width = w;
        this.height = h;
      }

      cleanup() {
        if (this.animationId) cancelAnimationFrame(this.animationId);
      }

      start() {}
      update() {}
      render() {}

      loop() {
        this.update();
        this.render();
        this.animationId = requestAnimationFrame(() => this.loop());
      }

      drawGrid() {
        const ctx = this.ctx;
        ctx.strokeStyle = 'rgba(255, 140, 0, 0.05)';
        ctx.lineWidth = 1;
        for (let x = 0; x < this.width; x += 30) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, this.height);
          ctx.stroke();
        }
        for (let y = 0; y < this.height; y += 30) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(this.width, y);
          ctx.stroke();
        }
      }
    }

    // ========================================
    // 反应速度游戏
    // ========================================
    class ReactionGame extends BaseGame {
      constructor(...args) {
        super(...args);
        this.state = 'idle';
        this.round = 0;
        this.maxRounds = 3;
        this.times = [];
        this.bestTime = Infinity;
        this.centerX = this.width / 2;
        this.centerY = this.height / 2;
        this.crosshairSize = 40;
        this.waitTime = 0;
        this.startTime = 0;
        this.reactionTime = 0;
        this.flashAlpha = 0;
        this.message = '';
        this.messageTime = 0;
        this.boundHandleTap = (e) => { e.preventDefault(); this.onTap(); };
        this.canvas.addEventListener('click', this.boundHandleTap);
        this.canvas.addEventListener('touchstart', this.boundHandleTap, { passive: false });
      }

      onTap() {
        switch (this.state) {
          case 'idle':
            this.startRound();
            break;
          case 'waiting':
            this.state = 'idle';
            this.showMessage('太急了！等待绿灯');
            setTimeout(() => this.startRound(), 1000);
            break;
          case 'ready':
            this.reactionTime = Date.now() - this.startTime;
            this.times.push(this.reactionTime);
            this.bestTime = Math.min(this.bestTime, this.reactionTime);
            this.state = 'result';
            this.flashAlpha = 1;
            this.showMessage(`${this.reactionTime}ms`);
            break;
        }
      }

      startRound() {
        this.round++;
        if (this.round > this.maxRounds) { this.endGame(); return; }
        this.state = 'waiting';
        this.waitTime = 1500 + Math.random() * 2500;
        setTimeout(() => {
          if (this.state === 'waiting') {
            this.state = 'ready';
            this.startTime = Date.now();
          }
        }, this.waitTime);
      }

      showMessage(msg) {
        this.message = msg;
        this.messageTime = Date.now();
      }

      start() {
        this.state = 'idle';
        this.round = 0;
        this.times = [];
        this.bestTime = Infinity;
        this.message = '';
        this.centerX = this.width / 2;
        this.centerY = this.height / 2;
        this.loop();
      }

      update() {
        if (this.flashAlpha > 0) this.flashAlpha -= 0.05;
      }

      render() {
        const ctx = this.ctx;
        ctx.fillStyle = '#0a0c10';
        ctx.fillRect(0, 0, this.width, this.height);
        this.drawGrid();

        switch (this.state) {
          case 'idle': this.drawIdle(); break;
          case 'waiting': this.drawWaiting(); break;
          case 'ready': this.drawReady(); break;
          case 'result': this.drawResult(); break;
        }

        this.drawHUD();

        if (this.message && Date.now() - this.messageTime < 1500) {
          ctx.fillStyle = '#ff8c00';
          ctx.font = 'bold 24px monospace';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(this.message, this.width / 2, this.height / 2 + 100);
        }
      }

      drawCrosshair(color, size) {
        const ctx = this.ctx;
        const cx = this.centerX;
        const cy = this.centerY;
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.arc(cx, cy, size, 0, Math.PI * 2);
        ctx.stroke();
        const gap = size * 0.3;
        ctx.beginPath();
        ctx.moveTo(cx, cy - size - gap); ctx.lineTo(cx, cy - gap);
        ctx.moveTo(cx, cy + gap); ctx.lineTo(cx, cy + size + gap);
        ctx.moveTo(cx - size - gap, cy); ctx.lineTo(cx - gap, cy);
        ctx.moveTo(cx + gap, cy); ctx.lineTo(cx + size + gap, cy);
        ctx.stroke();
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(cx, cy, 4, 0, Math.PI * 2);
        ctx.fill();
      }

      drawIdle() {
        this.drawCrosshair('#ff4444', this.crosshairSize);
        this.ctx.fillStyle = '#5a5a6a';
        this.ctx.font = '16px monospace';
        this.ctx.textAlign = 'center';
        this.ctx.textBaseline = 'middle';
        this.ctx.fillText('点击屏幕开始测试', this.centerX, this.centerY + 80);
      }

      drawWaiting() {
        this.drawCrosshair('#ff4444', this.crosshairSize);
        const pulse = Math.sin(Date.now() * 0.01) * 0.3 + 0.7;
        this.ctx.globalAlpha = pulse;
        this.ctx.fillStyle = '#ff4444';
        this.ctx.font = '14px monospace';
        this.ctx.textAlign = 'center';
        this.ctx.fillText('等待中...', this.centerX, this.centerY + 80);
        this.ctx.globalAlpha = 1;
      }

      drawReady() {
        this.drawCrosshair('#00ff88', this.crosshairSize);
        this.ctx.fillStyle = '#00ff88';
        this.ctx.font = 'bold 32px monospace';
        this.ctx.textAlign = 'center';
        this.ctx.textBaseline = 'middle';
        this.ctx.fillText('GO!', this.centerX, this.centerY + 80);
        if (this.flashAlpha > 0) {
          this.ctx.fillStyle = `rgba(0, 255, 136, ${this.flashAlpha * 0.3})`;
          this.ctx.fillRect(0, 0, this.width, this.height);
        }
      }

      drawResult() {
        this.ctx.fillStyle = '#00ff88';
        this.ctx.font = 'bold 36px monospace';
        this.ctx.textAlign = 'center';
        this.ctx.textBaseline = 'middle';
        this.ctx.fillText(`${this.reactionTime}ms`, this.centerX, this.centerY);
        this.ctx.fillStyle = '#5a5a6a';
        this.ctx.font = '16px monospace';
        this.ctx.fillText(`第 ${this.round} / ${this.maxRounds} 轮`, this.centerX, this.centerY + 50);
        if (!this.nextRoundScheduled) {
          this.nextRoundScheduled = true;
          setTimeout(() => {
            this.nextRoundScheduled = false;
            this.startRound();
          }, 2000);
        }
      }

      drawHUD() {
        const ctx = this.ctx;
        ctx.fillStyle = '#5a5a6a';
        ctx.font = '14px monospace';
        ctx.textAlign = 'left';
        ctx.fillText('反应速度', 16, 24);
        ctx.textAlign = 'right';
        ctx.fillText(`第 ${this.round || 1} / ${this.maxRounds} 轮`, this.width - 16, 24);
        const best = localStorage.getItem('esports_best_reaction');
        if (best && best !== 'Infinity') {
          ctx.textAlign = 'center';
          ctx.fillStyle = '#4ecdc4';
          ctx.fillText(`最佳: ${best}ms`, this.width / 2, 24);
        }
      }

      cleanup() {
        super.cleanup();
        this.canvas.removeEventListener('click', this.boundHandleTap);
        this.canvas.removeEventListener('touchstart', this.boundHandleTap);
      }

      endGame() {
        this.onEnd(this.bestTime);
      }
    }

    // ========================================
    // 极限手速游戏
    // ========================================
    class ClickSpeedGame extends BaseGame {
      constructor(...args) {
        super(...args);
        this.state = 'idle';
        this.score = 0;
        this.timeLeft = 30;
        this.balls = [];
        this.particles = [];
        this.lastTime = 0;
        this.boundHandleTap = (e) => {
          e.preventDefault();
          const rect = this.canvas.getBoundingClientRect();
          let x, y;
          if (e.touches && e.touches.length > 0) {
            x = e.touches[0].clientX - rect.left;
            y = e.touches[0].clientY - rect.top;
          } else {
            x = e.clientX - rect.left;
            y = e.clientY - rect.top;
          }
          this.onTap(x, y);
        };
        this.canvas.addEventListener('click', this.boundHandleTap);
        this.canvas.addEventListener('touchstart', this.boundHandleTap, { passive: false });
      }

      onTap(x, y) {
        if (this.state !== 'playing') return;
        for (let i = this.balls.length - 1; i >= 0; i--) {
          const ball = this.balls[i];
          const dist = Math.hypot(x - ball.x, y - ball.y);
          if (dist < ball.radius + 10) {
            this.score++;
            this.createParticles(ball.x, ball.y);
            this.balls.splice(i, 1);
            this.spawnBall();
            break;
          }
        }
      }

      createParticles(x, y) {
        for (let i = 0; i < 8; i++) {
          const angle = (Math.PI * 2 / 8) * i;
          this.particles.push({
            x, y,
            vx: Math.cos(angle) * 3,
            vy: Math.sin(angle) * 3,
            life: 1
          });
        }
      }

      spawnBall() {
        const padding = 60;
        const radius = 25 + Math.random() * 15;
        this.balls.push({
          x: padding + Math.random() * (this.width - padding * 2),
          y: padding + Math.random() * (this.height - padding * 2),
          radius,
          pulse: 0.8 + Math.random() * 0.2
        });
      }

      start() {
        this.state = 'playing';
        this.score = 0;
        this.timeLeft = 30;
        this.balls = [];
        this.particles = [];
        for (let i = 0; i < 3; i++) this.spawnBall();
        this.lastTime = Date.now();
        this.loop();
      }

      update() {
        const now = Date.now();
        const delta = (now - this.lastTime) / 1000;
        this.lastTime = now;
        this.timeLeft -= delta;
        if (this.timeLeft <= 0) { this.timeLeft = 0; this.endGame(); return; }
        this.balls.forEach(ball => {
          ball.pulse = Math.sin(Date.now() * 0.005) * 0.2 + 0.8;
        });
        for (let i = this.particles.length - 1; i >= 0; i--) {
          const p = this.particles[i];
          p.x += p.vx; p.y += p.vy; p.life -= 0.03;
          if (p.life <= 0) this.particles.splice(i, 1);
        }
        while (this.balls.length < 3) this.spawnBall();
      }

      render() {
        const ctx = this.ctx;
        ctx.fillStyle = '#0a0c10';
        ctx.fillRect(0, 0, this.width, this.height);
        this.drawGrid();

        this.balls.forEach(ball => {
          const gradient = ctx.createRadialGradient(ball.x, ball.y, 0, ball.x, ball.y, ball.radius * 2);
          gradient.addColorStop(0, 'rgba(255, 140, 0, 0.4)');
          gradient.addColorStop(1, 'rgba(255, 140, 0, 0)');
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(ball.x, ball.y, ball.radius * 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = `rgba(255, 140, 0, ${ball.pulse})`;
          ctx.beginPath();
          ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
          ctx.beginPath();
          ctx.arc(ball.x - ball.radius * 0.3, ball.y - ball.radius * 0.3, ball.radius * 0.3, 0, Math.PI * 2);
          ctx.fill();
        });

        this.particles.forEach(p => {
          ctx.globalAlpha = p.life;
          ctx.fillStyle = Math.random() > 0.5 ? '#ff8c00' : '#ff4400';
          ctx.beginPath();
          ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.globalAlpha = 1;
        this.drawHUD();
      }

      drawHUD() {
        const ctx = this.ctx;
        ctx.fillStyle = '#ff8c00';
        ctx.font = 'bold 48px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(this.score, this.width / 2, 60);
        ctx.fillStyle = '#5a5a6a';
        ctx.font = '14px monospace';
        ctx.fillText('得分', this.width / 2, 85);
        const timeColor = this.timeLeft <= 5 ? '#ff4444' : '#e8e8e8';
        ctx.fillStyle = timeColor;
        ctx.font = 'bold 24px monospace';
        ctx.textAlign = 'right';
        ctx.fillText(Math.ceil(this.timeLeft) + 's', this.width - 20, 40);
        const best = localStorage.getItem('esports_best_clickspeed');
        if (best) {
          ctx.fillStyle = '#4ecdc4';
          ctx.font = '14px monospace';
          ctx.textAlign = 'left';
          ctx.fillText(`最佳: ${best}`, 20, 40);
        }
      }

      cleanup() {
        super.cleanup();
        this.canvas.removeEventListener('click', this.boundHandleTap);
        this.canvas.removeEventListener('touchstart', this.boundHandleTap);
      }

      endGame() {
        this.state = 'ended';
        this.onEnd(this.score);
      }
    }

    // ========================================
    // 视野广度游戏
    // ========================================
    class VisionGame extends BaseGame {
      constructor(...args) {
        super(...args);
        this.state = 'idle';
        this.round = 0;
        this.maxRounds = 3;
        this.correctCount = 0;
        this.dots = [];
        this.selectedAnswer = null;
        this.resultShown = false;
        this.lastResult = false;
        this.boundHandleTap = (e) => {
          e.preventDefault();
          const rect = this.canvas.getBoundingClientRect();
          let x, y;
          if (e.touches && e.touches.length > 0) {
            x = e.touches[0].clientX - rect.left;
            y = e.touches[0].clientY - rect.top;
          } else {
            x = e.clientX - rect.left;
            y = e.clientY - rect.top;
          }
          this.onTap(x, y);
        };
        this.canvas.addEventListener('click', this.boundHandleTap);
        this.canvas.addEventListener('touchstart', this.boundHandleTap, { passive: false });
      }

      onTap(x, y) {
        if (this.state === 'idle') { this.startRound(); return; }
        if (this.state !== 'answering') return;
        const btnY = this.height - 120;
        const btnWidth = 80;
        const btnHeight = 50;
        const btnGap = 20;
        const startX = (this.width - (btnWidth * 3 + btnGap * 2)) / 2;
        for (let i = 0; i < 3; i++) {
          const bx = startX + i * (btnWidth + btnGap);
          if (x >= bx && x <= bx + btnWidth && y >= btnY && y <= btnY + btnHeight) {
            this.selectedAnswer = i;
            this.checkAnswer();
            return;
          }
        }
      }

      checkAnswer() {
        const correctAnswer = this.dots.length;
        const answers = [correctAnswer - 1, correctAnswer, correctAnswer + 1].sort((a, b) => a - b);
        let correct = false;
        if (this.selectedAnswer === 1 && this.dots.length === answers[1]) correct = true;
        else if (this.selectedAnswer === 0 && this.dots.length <= answers[0]) correct = true;
        else if (this.selectedAnswer === 2 && this.dots.length >= answers[2]) correct = true;
        if (correct) this.correctCount++;
        this.resultShown = true;
        this.lastResult = correct;
        setTimeout(() => { this.resultShown = false; this.startRound(); }, 1000);
      }

      startRound() {
        this.round++;
        if (this.round > this.maxRounds) { this.endGame(); return; }
        this.selectedAnswer = null;
        this.resultShown = false;
        const count = 3 + Math.floor(Math.random() * 7);
        this.dots = [];
        const padding = 60;
        const dotRadius = 12;
        const colors = ['#ff8c00', '#4ecdc4', '#a29bfe', '#fd79a8', '#00b894', '#ffeaa7'];
        for (let i = 0; i < count; i++) {
          let x, y, valid, attempts = 0;
          do {
            valid = true;
            x = padding + Math.random() * (this.width - padding * 2);
            y = padding + Math.random() * (this.height - padding * 3);
            for (const dot of this.dots) {
              if (Math.hypot(x - dot.x, y - dot.y) < dotRadius * 4) { valid = false; break; }
            }
            attempts++;
          } while (!valid && attempts < 50);
          this.dots.push({ x, y, radius: dotRadius, color: colors[Math.floor(Math.random() * colors.length)] });
        }
        this.state = 'showing';
        setTimeout(() => { this.dots = []; this.state = 'answering'; }, 900);
      }

      start() {
        this.state = 'idle';
        this.round = 0;
        this.correctCount = 0;
        this.loop();
      }

      render() {
        const ctx = this.ctx;
        ctx.fillStyle = '#0a0c10';
        ctx.fillRect(0, 0, this.width, this.height);
        this.drawGrid();
        if (this.state === 'idle') this.drawIdle();
        else if (this.state === 'showing') this.drawDots();
        else if (this.state === 'answering') this.drawAnswering();
        else if (this.state === 'result') this.drawFinished();
        this.drawHUD();
      }

      drawIdle() {
        this.ctx.fillStyle = '#e8e8e8';
        this.ctx.font = '18px monospace';
        this.ctx.textAlign = 'center';
        this.ctx.fillText('点击屏幕开始测试', this.width / 2, this.height / 2);
        this.ctx.fillStyle = '#5a5a6a';
        this.ctx.font = '14px monospace';
        this.ctx.fillText('记住看到的圆点数量', this.width / 2, this.height / 2 + 30);
      }

      drawDots() {
        this.dots.forEach(dot => {
          const gradient = this.ctx.createRadialGradient(dot.x, dot.y, 0, dot.x, dot.y, dot.radius * 2);
          gradient.addColorStop(0, dot.color);
          gradient.addColorStop(1, 'transparent');
          this.ctx.fillStyle = gradient;
          this.ctx.beginPath();
          this.ctx.arc(dot.x, dot.y, dot.radius * 2, 0, Math.PI * 2);
          this.ctx.fill();
          this.ctx.fillStyle = dot.color;
          this.ctx.beginPath();
          this.ctx.arc(dot.x, dot.y, dot.radius, 0, Math.PI * 2);
          this.ctx.fill();
        });
      }

      drawAnswering() {
        const ctx = this.ctx;
        const centerX = this.width / 2;
        const centerY = this.height / 2;
        ctx.fillStyle = '#ff8c00';
        ctx.font = 'bold 64px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('?', centerX, centerY);
        ctx.fillStyle = '#5a5a6a';
        ctx.font = '16px monospace';
        ctx.fillText('看到了几个圆点？', centerX, centerY + 50);
        this.drawAnswerButtons();
      }

      drawAnswerButtons() {
        const ctx = this.ctx;
        const btnY = this.height - 120;
        const btnWidth = 80;
        const btnHeight = 50;
        const btnGap = 20;
        const startX = (this.width - (btnWidth * 3 + btnGap * 2)) / 2;
        const answers = this.dots.length > 0 ? [this.dots.length - 1, this.dots.length, this.dots.length + 1] : [3, 4, 5];
        for (let i = 0; i < 3; i++) {
          const x = startX + i * (btnWidth + btnGap);
          ctx.fillStyle = 'rgba(255, 140, 0, 0.15)';
          ctx.strokeStyle = 'rgba(255, 140, 0, 0.4)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.roundRect(x, btnY, btnWidth, btnHeight, 8);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = '#e8e8e8';
          ctx.font = 'bold 20px monospace';
          ctx.textAlign = 'center';
          ctx.fillText(answers[i], x + btnWidth / 2, btnY + btnHeight / 2 + 7);
        }
      }

      drawFinished() {
        const ctx = this.ctx;
        ctx.fillStyle = this.lastResult ? '#00b894' : '#ff4444';
        ctx.font = 'bold 48px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(this.lastResult ? '正确!' : '错误', this.width / 2, this.height / 2);
      }

      drawHUD() {
        const ctx = this.ctx;
        ctx.fillStyle = '#5a5a6a';
        ctx.font = '14px monospace';
        ctx.textAlign = 'left';
        ctx.fillText('视野广度', 16, 24);
        ctx.textAlign = 'right';
        ctx.fillText(`第 ${this.round || 1} / ${this.maxRounds} 轮`, this.width - 16, 24);
        ctx.textAlign = 'center';
        ctx.fillStyle = '#4ecdc4';
        ctx.fillText(`正确: ${this.correctCount}`, this.width / 2, 24);
      }

      cleanup() {
        super.cleanup();
        this.canvas.removeEventListener('click', this.boundHandleTap);
        this.canvas.removeEventListener('touchstart', this.boundHandleTap);
      }

      endGame() {
        this.state = 'result';
        this.onEnd(this.correctCount);
      }
    }

    // ========================================
    // 动态追踪游戏
    // ========================================
    class TrackingGame extends BaseGame {
      constructor(...args) {
        super(...args);
        this.state = 'idle'; // idle, countdown, playing
        this.isHolding = false;
        this.ballX = 0;
        this.ballY = 0;
        this.ballVX = 0;
        this.ballVY = 0;
        this.targetX = 0;
        this.targetY = 0;
        this.circleRadius = 60;
        this.score = 0;
        this.startTime = 0;
        this.elapsedTime = 0;
        this.difficulty = 1;
        this.countdownValue = 3;
        // 鼠标/触摸直接控制圆圈位置
        this.boundMove = (e) => {
          e.preventDefault();
          if (this.state !== 'playing' && this.state !== 'countdown') return;
          const rect = this.canvas.getBoundingClientRect();
          if (e.touches && e.touches.length > 0) {
            this.targetX = e.touches[0].clientX - rect.left;
            this.targetY = e.touches[0].clientY - rect.top;
          } else {
            this.targetX = e.clientX - rect.left;
            this.targetY = e.clientY - rect.top;
          }
        };
        this.canvas.addEventListener('mousemove', this.boundMove);
        this.canvas.addEventListener('touchmove', this.boundMove, { passive: false });
        this.canvas.addEventListener('touchstart', this.boundMove, { passive: false });
      }

      start() {
        this.state = 'countdown';
        this.isHolding = false;
        this.score = 0;
        this.difficulty = 1;
        this.startTime = Date.now();
        this.elapsedTime = 0;
        // 球放在中心
        this.ballX = this.width / 2;
        this.ballY = this.height / 2;
        this.ballVX = 0;
        this.ballVY = 0;
        // 圆圈也在中心
        this.targetX = this.width / 2;
        this.targetY = this.height / 2;
        this.circleRadius = 60;
        this.countdownValue = 3;
        this.lastTime = Date.now();

        // 倒计时逻辑
        this.countdownInterval = setInterval(() => {
          this.countdownValue--;
          if (this.countdownValue <= 0) {
            clearInterval(this.countdownInterval);
            // 开始游戏，球开始移动
            this.state = 'playing';
            const angle = Math.random() * Math.PI * 2;
            this.ballVX = Math.cos(angle) * 2;
            this.ballVY = Math.sin(angle) * 2;
            this.startTime = Date.now();
          }
        }, 1000);

        this.loop();
      }

      update() {
        const now = Date.now();
        const delta = (now - this.lastTime) / 1000;
        this.lastTime = now;

        if (this.state === 'countdown') {
          // 倒计时时球缓慢移动，让玩家适应
          this.ballX += Math.sin(now * 0.001) * 0.5;
          this.ballY += Math.cos(now * 0.001) * 0.5;
          this.elapsedTime = 0;
          this.score = 0;
          return;
        }

        if (this.state !== 'playing') return;

        this.elapsedTime = (now - this.startTime) / 1000;
        this.difficulty = 1 + this.elapsedTime * 0.03;
        this.circleRadius = Math.max(35, 55 - this.elapsedTime * 0.3);

        // 球的速度逐渐增加
        const baseSpeed = 2.5 + this.elapsedTime * 0.08;
        const currentSpeed = Math.hypot(this.ballVX, this.ballVY);
        if (currentSpeed > 0) {
          this.ballVX = (this.ballVX / currentSpeed) * baseSpeed;
          this.ballVY = (this.ballVY / currentSpeed) * baseSpeed;
        }

        // 移动球
        this.ballX += this.ballVX;
        this.ballY += this.ballVY;

        // 边界反弹
        const margin = 40;
        if (this.ballX < margin) { this.ballVX = Math.abs(this.ballVX); this.ballX = margin; }
        if (this.ballX > this.width - margin) { this.ballVX = -Math.abs(this.ballVX); this.ballX = this.width - margin; }
        if (this.ballY < 60) { this.ballVY = Math.abs(this.ballVY); this.ballY = 60; }
        if (this.ballY > this.height - margin) { this.ballVY = -Math.abs(this.ballVY); this.ballY = this.height - margin; }

        // 检测：圆圈是否套住球
        const dist = Math.hypot(this.ballX - this.targetX, this.ballY - this.targetY);
        if (dist > this.circleRadius) {
          this.endGame();
          return;
        }

        this.score = Math.floor(this.elapsedTime * 10) / 10;
      }

      render() {
        const ctx = this.ctx;
        ctx.fillStyle = '#0a0c10';
        ctx.fillRect(0, 0, this.width, this.height);
        this.drawGrid();

        // 圆圈（跟随鼠标/触摸）
        const circleColor = this.state === 'playing' ? 'rgba(78, 205, 196, 0.8)' : 'rgba(255, 140, 0, 0.5)';
        ctx.strokeStyle = circleColor;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(this.targetX, this.targetY, this.circleRadius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = this.state === 'playing' ? 'rgba(78, 205, 196, 0.1)' : 'rgba(255, 140, 0, 0.05)';
        ctx.fill();

        // 球
        const ballGradient = ctx.createRadialGradient(this.ballX - 5, this.ballY - 5, 0, this.ballX, this.ballY, 20);
        ballGradient.addColorStop(0, '#ffffff');
        ballGradient.addColorStop(0.3, '#ff8c00');
        ballGradient.addColorStop(1, '#ff4400');
        ctx.fillStyle = ballGradient;
        ctx.beginPath();
        ctx.arc(this.ballX, this.ballY, 20, 0, Math.PI * 2);
        ctx.fill();

        // 状态提示
        if (this.state === 'countdown') {
          // 倒计时显示
          ctx.fillStyle = '#ff8c00';
          ctx.font = 'bold 120px monospace';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          const text = this.countdownValue > 0 ? this.countdownValue.toString() : 'GO!';
          ctx.fillText(text, this.width / 2, this.height / 2);

          ctx.fillStyle = '#5a5a6a';
          ctx.font = '18px monospace';
          ctx.fillText('移动鼠标控制圆圈', this.width / 2, this.height / 2 + 100);
          ctx.fillText('保持圆圈圈住小球', this.width / 2, this.height / 2 + 130);
        } else if (this.state === 'playing') {
          // 无提示，游戏进行中
        }

        this.drawHUD();
      }

      drawHUD() {
        const ctx = this.ctx;
        ctx.fillStyle = '#5a5a6a';
        ctx.font = '14px monospace';
        ctx.textAlign = 'left';
        ctx.fillText('动态追踪', 16, 24);

        if (this.state === 'playing') {
          ctx.fillStyle = '#ff8c00';
          ctx.font = 'bold 32px monospace';
          ctx.textAlign = 'center';
          ctx.fillText(this.score.toFixed(1) + 's', this.width / 2, 35);
          ctx.fillStyle = '#5a5a6a';
          ctx.font = '12px monospace';
          ctx.fillText(`难度 x${this.difficulty.toFixed(1)}`, this.width / 2, 55);
        }

        const best = localStorage.getItem('esports_best_tracking');
        if (best) {
          ctx.fillStyle = '#4ecdc4';
          ctx.font = '14px monospace';
          ctx.textAlign = 'right';
          ctx.fillText(`最佳: ${best}s`, this.width - 16, 24);
        }
      }

      cleanup() {
        super.cleanup();
        if (this.countdownInterval) clearInterval(this.countdownInterval);
        this.canvas.removeEventListener('mousemove', this.boundMove);
        this.canvas.removeEventListener('touchmove', this.boundMove);
        this.canvas.removeEventListener('touchstart', this.boundMove);
      }

      endGame() {
        this.state = 'ended';
        this.onEnd(parseFloat(this.score.toFixed(1)));
      }
    }

    // ========================================
    // 顺序记忆游戏
    // ========================================
    class MemoryGame extends BaseGame {
      constructor(...args) {
        super(...args);
        this.state = 'idle';
        this.sequence = [];
        this.playerInput = [];
        this.currentShowIndex = 0;
        this.currentInputIndex = 0;
        this.score = 0;
        this.maxScore = 0;
        this.arrows = [
          { dir: 'up', x: 0, y: 0, symbol: '↑' },
          { dir: 'down', x: 0, y: 0, symbol: '↓' },
          { dir: 'left', x: 0, y: 0, symbol: '←' },
          { dir: 'right', x: 0, y: 0, symbol: '→' }
        ];
        this.boundHandleTap = (e) => {
          e.preventDefault();
          const rect = this.canvas.getBoundingClientRect();
          let x, y;
          if (e.touches && e.touches.length > 0) {
            x = e.touches[0].clientX - rect.left;
            y = e.touches[0].clientY - rect.top;
          } else {
            x = e.clientX - rect.left;
            y = e.clientY - rect.top;
          }
          this.onTap(x, y);
        };
        this.canvas.addEventListener('click', this.boundHandleTap);
        this.canvas.addEventListener('touchstart', this.boundHandleTap, { passive: false });
        this.initArrowPositions();
      }

      initArrowPositions() {
        const padding = 40;
        const centerX = this.width / 2;
        const centerY = this.height / 2;
        this.arrows[0].x = centerX; this.arrows[0].y = padding;
        this.arrows[1].x = centerX; this.arrows[1].y = this.height - padding;
        this.arrows[2].x = padding; this.arrows[2].y = centerY;
        this.arrows[3].x = this.width - padding; this.arrows[3].y = centerY;
      }

      onTap(x, y) {
        if (this.state !== 'input') return;
        for (const arrow of this.arrows) {
          const dist = Math.hypot(x - arrow.x, y - arrow.y);
          if (dist < 50) {
            this.playerInput.push(arrow.dir);
            this.highlightArrow(arrow);
            if (this.playerInput[this.currentInputIndex] !== this.sequence[this.currentInputIndex]) {
              this.onMistake(); return;
            }
            this.currentInputIndex++;
            if (this.currentInputIndex >= this.sequence.length) this.onSequenceComplete();
            return;
          }
        }
      }

      highlightArrow(arrow) {
        arrow.highlighted = true;
        arrow.highlightTime = Date.now();
        setTimeout(() => { arrow.highlighted = false; }, 200);
      }

      onMistake() {
        this.state = 'result';
        this.maxScore = Math.max(this.maxScore, this.score);
        setTimeout(() => { this.endGame(); }, 1500);
      }

      onSequenceComplete() {
        this.score = this.sequence.length;
        this.maxScore = Math.max(this.maxScore, this.score);
        setTimeout(() => { this.addToSequence(); this.showSequence(); }, 500);
      }

      addToSequence() {
        const randomIndex = Math.floor(Math.random() * 4);
        this.sequence.push(this.arrows[randomIndex].dir);
      }

      showSequence() {
        this.state = 'showing';
        this.currentShowIndex = 0;
        this.playerInput = [];
        this.currentInputIndex = 0;
        const showNext = () => {
          if (this.currentShowIndex >= this.sequence.length) {
            setTimeout(() => { this.state = 'input'; }, 300); return;
          }
          const dir = this.sequence[this.currentShowIndex];
          const arrow = this.arrows.find(a => a.dir === dir);
          this.highlightArrow(arrow);
          this.currentShowIndex++;
          setTimeout(showNext, 600);
        };
        setTimeout(showNext, 500);
      }

      start() {
        this.state = 'idle';
        this.sequence = [];
        this.playerInput = [];
        this.currentShowIndex = 0;
        this.currentInputIndex = 0;
        this.score = 0;
        this.maxScore = 0;
        this.addToSequence();
        setTimeout(() => { this.showSequence(); }, 500);
        this.loop();
      }

      update() {
        this.arrows.forEach(arrow => {
          if (arrow.highlighted && Date.now() - arrow.highlightTime > 200) arrow.highlighted = false;
        });
      }

      render() {
        const ctx = this.ctx;
        ctx.fillStyle = '#0a0c10';
        ctx.fillRect(0, 0, this.width, this.height);
        this.drawGrid();
        this.drawArrows();
        this.drawCenter();
        this.drawHUD();
      }

      drawArrows() {
        this.arrows.forEach(arrow => {
          const color = arrow.highlighted ? '#ff8c00' : 'rgba(255, 140, 0, 0.4)';
          const scale = arrow.highlighted ? 1.2 : 1;
          this.ctx.save();
          this.ctx.translate(arrow.x, arrow.y);
          this.ctx.scale(scale, scale);
          this.ctx.fillStyle = arrow.highlighted ? 'rgba(255, 140, 0, 0.3)' : 'rgba(255, 140, 0, 0.1)';
          this.ctx.beginPath();
          this.ctx.arc(0, 0, 40, 0, Math.PI * 2);
          this.ctx.fill();
          this.ctx.fillStyle = color;
          this.ctx.font = 'bold 36px monospace';
          this.ctx.textAlign = 'center';
          this.ctx.textBaseline = 'middle';
          this.ctx.fillText(arrow.symbol, 0, 0);
          this.ctx.restore();
        });
      }

      drawCenter() {
        const ctx = this.ctx;
        const centerX = this.width / 2;
        const centerY = this.height / 2;
        if (this.state === 'idle') {
          ctx.fillStyle = '#e8e8e8';
          ctx.font = '18px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('点击屏幕开始', centerX, centerY);
          ctx.fillStyle = '#5a5a6a';
          ctx.font = '14px monospace';
          ctx.fillText('记住箭头顺序', centerX, centerY + 30);
        } else if (this.state === 'showing') {
          ctx.fillStyle = '#ff8c00';
          ctx.font = 'bold 24px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('记住顺序', centerX, centerY);
          ctx.fillStyle = '#5a5a6a';
          ctx.font = '14px monospace';
          ctx.fillText(`${this.currentShowIndex} / ${this.sequence.length}`, centerX, centerY + 30);
        } else if (this.state === 'input') {
          ctx.fillStyle = '#4ecdc4';
          ctx.font = 'bold 20px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('轮到你了', centerX, centerY);
          ctx.fillStyle = '#5a5a6a';
          ctx.font = '14px monospace';
          ctx.fillText(`${this.currentInputIndex} / ${this.sequence.length}`, centerX, centerY + 30);
        } else if (this.state === 'result') {
          ctx.fillStyle = '#ff4444';
          ctx.font = 'bold 24px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('错误!', centerX, centerY);
          ctx.fillStyle = '#5a5a6a';
          ctx.font = '14px monospace';
          ctx.fillText(`最终成绩: ${this.maxScore} 步`, centerX, centerY + 30);
        }
      }

      drawHUD() {
        const ctx = this.ctx;
        ctx.fillStyle = '#5a5a6a';
        ctx.font = '14px monospace';
        ctx.textAlign = 'left';
        ctx.fillText('顺序记忆', 16, 24);
        ctx.textAlign = 'right';
        ctx.fillText(`当前: ${this.score} 步`, this.width - 16, 24);
        const best = localStorage.getItem('esports_best_memory');
        if (best) {
          ctx.textAlign = 'center';
          ctx.fillStyle = '#4ecdc4';
          ctx.fillText(`最佳: ${best} 步`, this.width / 2, 24);
        }
      }

      resize(w, h) {
        super.resize(w, h);
        this.initArrowPositions();
      }

      cleanup() {
        super.cleanup();
        this.canvas.removeEventListener('click', this.boundHandleTap);
        this.canvas.removeEventListener('touchstart', this.boundHandleTap);
      }

      endGame() {
        this.onEnd(this.maxScore);
      }
    }

    // ========================================
    // 手眼协调游戏
    // ========================================
    class CoordinationGame extends BaseGame {
      constructor(...args) {
        super(...args);
        this.state = 'idle';
        this.score = 0;
        this.timeLeft = 30;
        this.paddleX = 0;
        this.paddleWidth = 100;
        this.paddleHeight = 15;
        this.paddleY = 0;
        this.balls = [];
        this.particles = [];
        this.difficulty = 1;
        this.lastTime = 0;
        this.boundMove = (e) => {
          e.preventDefault();
          if (this.state !== 'playing') return;
          const rect = this.canvas.getBoundingClientRect();
          let x;
          if (e.touches && e.touches.length > 0) x = e.touches[0].clientX - rect.left;
          else x = e.clientX - rect.left;
          this.paddleX = x - this.paddleWidth / 2;
          this.paddleX = Math.max(0, Math.min(this.width - this.paddleWidth, this.paddleX));
        };
        this.boundClick = (e) => { e.preventDefault(); if (this.state === 'idle') this.start(); };
        this.canvas.addEventListener('mousemove', this.boundMove);
        this.canvas.addEventListener('touchmove', this.boundMove, { passive: false });
        this.canvas.addEventListener('click', this.boundClick);
        this.canvas.addEventListener('touchstart', (e) => {
          e.preventDefault();
          if (this.state === 'idle') this.start();
          else this.boundMove(e);
        }, { passive: false });
        this.initPositions();
      }

      initPositions() {
        this.paddleY = this.height - 50;
        this.paddleX = this.width / 2 - this.paddleWidth / 2;
      }

      spawnBall() {
        const ballRadius = 12;
        const x = 30 + Math.random() * (this.width - 60);
        const baseSpeed = 3 + this.difficulty * 0.5;
        this.balls.push({ x, y: -ballRadius, radius: ballRadius, vy: baseSpeed, vx: (Math.random() - 0.5) * 2, trail: [] });
      }

      createParticles(x, y) {
        for (let i = 0; i < 6; i++) {
          const angle = (Math.PI * 2 / 6) * i + Math.random() * 0.5;
          this.particles.push({ x, y, vx: Math.cos(angle) * (2 + Math.random() * 2), vy: Math.sin(angle) * (2 + Math.random() * 2), life: 1 });
        }
      }

      start() {
        this.state = 'playing';
        this.score = 0;
        this.timeLeft = 30;
        this.balls = [];
        this.particles = [];
        this.difficulty = 1;
        this.initPositions();
        this.spawnBall();
        this.lastTime = Date.now();
        this.loop();
      }

      update() {
        const now = Date.now();
        const delta = (now - this.lastTime) / 1000;
        this.lastTime = now;
        this.timeLeft -= delta;
        if (this.timeLeft <= 0) { this.timeLeft = 0; this.endGame(); return; }
        this.difficulty = 1 + (30 - this.timeLeft) * 0.03;
        const targetBallCount = Math.min(5, 1 + Math.floor((30 - this.timeLeft) / 10));
        if (this.balls.length < targetBallCount && Math.random() < 0.05) this.spawnBall();
        for (let i = this.balls.length - 1; i >= 0; i--) {
          const ball = this.balls[i];
          ball.trail.push({ x: ball.x, y: ball.y });
          if (ball.trail.length > 10) ball.trail.shift();
          ball.y += ball.vy;
          ball.vy += 0.05 * this.difficulty;
          ball.x += ball.vx;
          if (ball.x < ball.radius || ball.x > this.width - ball.radius) { ball.vx *= -0.8; ball.x = Math.max(ball.radius, Math.min(this.width - ball.radius, ball.x)); }
          if (ball.y + ball.radius >= this.paddleY && ball.y - ball.radius <= this.paddleY + this.paddleHeight && ball.x >= this.paddleX && ball.x <= this.paddleX + this.paddleWidth) {
            this.score++;
            this.createParticles(ball.x, this.paddleY);
            this.balls.splice(i, 1);
            continue;
          }
          if (ball.y > this.height + ball.radius) this.balls.splice(i, 1);
        }
        for (let i = this.particles.length - 1; i >= 0; i--) {
          const p = this.particles[i];
          p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.03;
          if (p.life <= 0) this.particles.splice(i, 1);
        }
      }

      render() {
        const ctx = this.ctx;
        ctx.fillStyle = '#0a0c10';
        ctx.fillRect(0, 0, this.width, this.height);
        this.drawGrid();
        this.drawPaddle();
        this.balls.forEach(ball => this.drawBall(ball));
        this.particles.forEach(p => {
          ctx.globalAlpha = p.life;
          ctx.fillStyle = Math.random() > 0.5 ? '#4ecdc4' : '#00b894';
          ctx.beginPath();
          ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.globalAlpha = 1;
        if (this.state === 'idle') this.drawIdle();
        this.drawHUD();
      }

      drawPaddle() {
        const ctx = this.ctx;
        const gradient = ctx.createLinearGradient(this.paddleX, this.paddleY, this.paddleX, this.paddleY + this.paddleHeight);
        gradient.addColorStop(0, '#4ecdc4');
        gradient.addColorStop(1, '#00b894');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.roundRect(this.paddleX, this.paddleY, this.paddleWidth, this.paddleHeight, 8);
        ctx.fill();
        ctx.shadowColor = '#4ecdc4';
        ctx.shadowBlur = 15;
        ctx.fillStyle = gradient;
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      drawBall(ball) {
        const ctx = this.ctx;
        ball.trail.forEach((pos, i) => {
          const alpha = (i / ball.trail.length) * 0.3;
          ctx.fillStyle = `rgba(255, 140, 0, ${alpha})`;
          ctx.beginPath();
          ctx.arc(pos.x, pos.y, ball.radius * 0.5, 0, Math.PI * 2);
          ctx.fill();
        });
        const gradient = ctx.createRadialGradient(ball.x, ball.y, 0, ball.x, ball.y, ball.radius * 2);
        gradient.addColorStop(0, 'rgba(255, 140, 0, 0.4)');
        gradient.addColorStop(1, 'rgba(255, 140, 0, 0)');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius * 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ff8c00';
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
        ctx.beginPath();
        ctx.arc(ball.x - ball.radius * 0.3, ball.y - ball.radius * 0.3, ball.radius * 0.3, 0, Math.PI * 2);
        ctx.fill();
      }

      drawIdle() {
        const ctx = this.ctx;
        ctx.fillStyle = '#e8e8e8';
        ctx.font = '18px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('点击屏幕开始', this.width / 2, this.height / 2);
        ctx.fillStyle = '#5a5a6a';
        ctx.font = '14px monospace';
        ctx.fillText('控制滑块接住小球', this.width / 2, this.height / 2 + 30);
      }

      drawHUD() {
        const ctx = this.ctx;
        ctx.fillStyle = '#5a5a6a';
        ctx.font = '14px monospace';
        ctx.textAlign = 'left';
        ctx.fillText('手眼协调', 16, 24);
        ctx.fillStyle = '#ff8c00';
        ctx.font = 'bold 36px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(this.score, this.width / 2, 35);
        const timeColor = this.timeLeft <= 5 ? '#ff4444' : '#e8e8e8';
        ctx.fillStyle = timeColor;
        ctx.font = 'bold 24px monospace';
        ctx.textAlign = 'right';
        ctx.fillText(Math.ceil(this.timeLeft) + 's', this.width - 20, 35);
        ctx.fillStyle = '#5a5a6a';
        ctx.font = '12px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(`速度 x${this.difficulty.toFixed(1)}`, this.width / 2, 55);
        const best = localStorage.getItem('esports_best_coordination');
        if (best) {
          ctx.fillStyle = '#4ecdc4';
          ctx.font = '14px monospace';
          ctx.textAlign = 'left';
          ctx.fillText(`最佳: ${best}`, 20, 45);
        }
      }

      resize(w, h) {
        super.resize(w, h);
        this.initPositions();
      }

      cleanup() {
        super.cleanup();
        this.canvas.removeEventListener('mousemove', this.boundMove);
        this.canvas.removeEventListener('touchmove', this.boundMove);
        this.canvas.removeEventListener('click', this.boundClick);
      }

      endGame() {
        this.state = 'ended';
        this.onEnd(this.score);
      }
    }

    // ========================================
    // 游戏工厂
    // ========================================
    const GAME_CLASSES = {
      reaction: ReactionGame,
      clickspeed: ClickSpeedGame,
      vision: VisionGame,
      tracking: TrackingGame,
      memory: MemoryGame,
      coordination: CoordinationGame
    };

    // ========================================
    // 事件绑定
    // ========================================
    document.querySelectorAll('.game-card').forEach(card => {
      card.addEventListener('click', () => {
        currentGameId = card.dataset.game;
        updateRuleScreen(currentGameId);
        switchScreen(Screen.RULE);
      });
      card.addEventListener('touchstart', (e) => {
        e.preventDefault();
        currentGameId = card.dataset.game;
        updateRuleScreen(currentGameId);
        switchScreen(Screen.RULE);
      }, { passive: false });
    });

    document.getElementById('startTestBtn').addEventListener('click', () => {
      if (currentGameId) { switchScreen(Screen.GAME); loadGame(currentGameId); }
    });
    document.getElementById('startTestBtn').addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (currentGameId) { switchScreen(Screen.GAME); loadGame(currentGameId); }
    }, { passive: false });

    document.getElementById('backToHomeBtn').addEventListener('click', () => switchScreen(Screen.HOME));
    document.getElementById('backToHomeBtn').addEventListener('touchstart', (e) => { e.preventDefault(); switchScreen(Screen.HOME); }, { passive: false });

    document.getElementById('retryBtn').addEventListener('click', () => {
      if (currentGameId) { switchScreen(Screen.GAME); loadGame(currentGameId); }
    });
    document.getElementById('retryBtn').addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (currentGameId) { switchScreen(Screen.GAME); loadGame(currentGameId); }
    }, { passive: false });

    document.getElementById('homeBtn').addEventListener('click', () => {
      if (currentGame) { currentGame.cleanup(); currentGame = null; }
      switchScreen(Screen.HOME);
    });
    document.getElementById('homeBtn').addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (currentGame) { currentGame.cleanup(); currentGame = null; }
      switchScreen(Screen.HOME);
    }, { passive: false });

    window.addEventListener('resize', () => {
      if (currentScreen === Screen.GAME && currentGame) {
        resizeCanvas();
        currentGame.resize(canvas.width / window.devicePixelRatio, canvas.height / window.devicePixelRatio);
      }
    });

    // ========================================
    // 游戏加载
    // ========================================
    function loadGame(gameId) {
      if (currentGame) { currentGame.cleanup(); currentGame = null; }
      const GameClass = GAME_CLASSES[gameId];
      if (!GameClass) return;
      resizeCanvas();
      currentGame = new GameClass(ctx, canvas, canvas.width / window.devicePixelRatio, canvas.height / window.devicePixelRatio, {
        onEnd: (score) => {
          updateResultScreen(gameId, score);
          switchScreen(Screen.RESULT);
        }
      });
      currentGame.start();
    }

    // ========================================
    // 初始化
    // ========================================
    switchScreen(Screen.HOME);
  </script>
